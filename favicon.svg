<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Trébol de 4 hojas -->
  <defs>
    <style>
      .trebol-hoja { fill: #83f650; }
      .trebol-tallo { fill: #76b25c; }
    </style>
  </defs>
  
  <!-- Tallo -->
  <rect x="47" y="55" width="6" height="35" class="trebol-tallo" rx="3"/>
  
  <!-- Hoja superior -->
  <ellipse cx="50" cy="25" rx="12" ry="18" class="trebol-hoja"/>
  
  <!-- Hoja izquierda -->
  <ellipse cx="25" cy="45" rx="12" ry="18" transform="rotate(-60 25 45)" class="trebol-hoja"/>
  
  <!-- Hoja derecha -->
  <ellipse cx="75" cy="45" rx="12" ry="18" transform="rotate(60 75 45)" class="trebol-hoja"/>
  
  <!-- Hoja inferior (la 4ta) -->
  <ellipse cx="50" cy="65" rx="12" ry="18" class="trebol-hoja" transform="rotate(180 50 65)"/>
</svg>